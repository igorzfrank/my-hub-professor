<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>🎮 Margin e Padding — Estilo Gamer</h1>
    <div class="primeiroQuadrado">
        <p>🎯 Padding: 30px — espaço interno</p>
        <p>O escudo azul cresceu para dentro.</p>
    </div>
    <div class="segundoQuadrado">
        <p>⚔️ Margin: 30px — espaço externo</p>
        <p>O bloco verde se afastou dos outros.</p>
    </div>
    <div class="terceiroQuadrado">
        <p>🔥 Margin: 20px + Padding: 20px</p>
        <p>Margin afasta por fora. Padding cresce por dentro.</p>
    </div>
</body>
</html>
