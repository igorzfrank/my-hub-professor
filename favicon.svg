<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sol" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#e65100"/>
      <stop offset="50%" stop-color="#ff8f00"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo circular escuro -->
  <circle cx="50" cy="50" r="48" fill="#0d0d14" stroke="#f97316" stroke-width="3"/>

  <!-- Sol nascente (círculo central) -->
  <circle cx="50" cy="55" r="16" fill="url(#sol)" filter="url(#glow)"/>

  <!-- Raios do sol -->
  <g stroke="rgba(255,143,0,0.6)" stroke-width="2" stroke-linecap="round">
    <line x1="50" y1="30" x2="50" y2="15"/>
    <line x1="50" y1="80" x2="50" y2="95"/>
    <line x1="20" y1="55" x2="5" y2="55"/>
    <line x1="80" y1="55" x2="95" y2="55"/>
    <line x1="29" y1="34" x2="18" y2="23"/>
    <line x1="71" y1="34" x2="82" y2="23"/>
    <line x1="29" y1="76" x2="18" y2="87"/>
    <line x1="71" y1="76" x2="82" y2="87"/>
  </g>

  <!-- Kanji 滅 (Destruição) no centro -->
  <text x="50" y="60" text-anchor="middle" dominant-baseline="middle"
        font-family="serif" font-size="22" font-weight="bold"
        fill="#0d0d14" opacity="0.9">滅</text>
</svg>